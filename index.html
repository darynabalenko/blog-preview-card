<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <article class="card">
      <img class="card__image" src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=800&q=80" alt="Робоче місце з ноутбуком">

      <div class="card__content">
        <span class="card__category">Learning</span>
        <small class="card__date">Опубліковано 21 грудня 2025</small>

        <h1 class="card__title">HTML & CSS foundations</h1>

        <p class="card__description">
          Ця картка блогу створена за допомогою HTML та CSS. У роботі використано Flexbox,
          семантичну структуру, відступи, тінь і закруглені кути.
        </p>

        <div class="card__author">
          <div class="card__avatar">D</div>
          <span class="card__author-name">Дарина Баленко</span>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
