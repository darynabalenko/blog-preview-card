<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <article class="card">
      <img class="card__image" src="_images/Blog Image.png" alt="Blog illustration">

      <div class="card__content">
        <span class="card__category">Learning</span>

        <p class="card__date">Published 21 Dec 2023</p>

        <h1 class="card__title">HTML & CSS foundations</h1>

        <p class="card__description">
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>

        <div class="card__author">
          <img class="card__avatar" src="_images/avatar-femail.png" alt="Author avatar">
          <span class="card__author-name">Greg Hooper</span>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
