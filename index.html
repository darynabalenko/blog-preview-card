<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Preview Card</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <article class="card">
      <div class="card__image-wrapper">
        <img class="card__image" src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?auto=format&fit=crop&w=800&q=80" alt="Робоче місце з ноутбуком">
      </div>
      
      <div class="card__content">
        <span class="card__category">Learning</span>
        
        <span class="card__date">Опубліковано 28 квітня 2026</span>
        
        <h2 class="card__title">HTML & CSS foundations</h2>
        
        <p class="card__description">
          Ці мови є основою для створення веб-сторінок. Вивчаючи HTML та CSS, 
          ви зможете створювати красиві та функціональні сайти.
        </p>
        
        <div class="card__author">
          <div class="card__avatar" aria-label="Аватар автора">Д</div>
          <span class="card__author-name">Дарина Баленко</span>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
